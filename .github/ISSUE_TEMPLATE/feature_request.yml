name: Feature request
description: Propose a product, platform, jurisdiction-pack, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: need
    attributes:
      label: Need
      description: What user, operator, or maintainer problem should this solve?
      placeholder: Verification officers need...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Citizen PWA
        - Government console
        - Admin/governance
        - API/server
        - Security/privacy
        - Jurisdiction packs
        - Docs/tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Note privacy, safety, accessibility, licensing, or deployment constraints.
  - type: checkboxes
    id: checks
    attributes:
      label: Public repository checks
      options:
        - label: This request avoids real citizen data, private evidence, official marks, and unlicensed third-party assets.
          required: true
